jokes:
  hf_config_name: "jokes"
  deduplication:
    enabled: true
    token_set_min_unique_tokens: 5
    min_tokens_for_near_match: 4
    token_jaccard_threshold: 0.92
    char_jaccard_threshold: 0.9
    edit_ratio_threshold: 0.94

embeddings:
  hf_config_name: "embeddings"
  jokes_split: "train"
  model: "qwen/qwen3-embedding-8b"
  dimensions: 1024
  batch_size: 256
  shard_size: 10000
  max_parallel_requests: 5
  timeout: 120
  max_retries: 5

keywords:
  hf_config_name: "keywords"
  jokes_split: "train[:1500]"
  embeddings_split: "train"
  model: "qwen/qwen3-embedding-8b"
  ngram_min: 1
  ngram_max: 1
  top_n: 3
  mmr_diversity: 0.7
  stopwords: true
  max_candidates: 64
  dimensions: 1024
  batch_size: 64
  shard_size: 10000
  max_parallel_requests: 15
  timeout: 120
  max_retries: 5

references:
  hf_config_name: "references"
  jokes_split: "train"
  embeddings_split: "train"
  keywords_split: "train"
  model: "qwen/qwen3-embedding-8b"
  dimensions: 1024
  min_keywords: 1
  max_keywords: 2
  top_k: 5
  min_references: 2
  min_similarity: 0.5
  input_batch_size: 128
  output_batch_size: 128
  shard_size: 10000
  max_parallel_requests: 5
  timeout: 120
  max_retries: 5
  faiss_nlist: 4096
  faiss_nprobe: 64
  faiss_train_size: 200000
  faiss_batch_size: 20000
  oversample: 10
  validation_fraction: 0.1
  test_fraction: 0.1
  random_seed: 42
  index_dirname: "index"

candidates:
  hf_config_name: "candidates"
  model: "gpt-4.1-mini"
  shard_size: 5000
  max_parallel_requests: 16
  timeout: 60
  max_retries: 3
  temperature: 1.0
  max_completion_tokens: 128

evaluation:
  hf_config_name: "evaluation"
  model: "gpt-4.1-mini"
  input_batch_size: 128
  shard_size: 5000
  max_parallel_requests: 16
  timeout: 60
  max_retries: 3
  judge_temperature: 0.0
  max_prompt_chars: 1000
  max_response_chars: 1200
  random_seed: 42
