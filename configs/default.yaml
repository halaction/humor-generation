jokes:
  hf_config_name: "jokes"
  data_filename: "jokes.parquet"

embeddings:
  hf_config_name: "embeddings"
  data_filename: "embeddings.parquet"
  model: "qwen/qwen3-embedding-8b"
  dimensions: 1024
  batch_size: 64
  shard_size: 10000
  max_parallel_requests: 5
  timeout: 60
  max_retries: 3

keywords:
  hf_config_name: "keywords"
  data_filename: "keywords.parquet"
  ngram_min: 1
  ngram_max: 1
  top_n: 3
  mmr_diversity: 0.7
  stopwords: true
  max_candidates: 64
  model: "qwen/qwen3-embedding-8b"
  dimensions: 1024
  batch_size: 256
  shard_size: 10000
  max_parallel_requests: 15
  timeout: 60
  max_retries: 3

references:
  hf_config_name: "references"
  data_filename: "references.parquet"
  model: "qwen/qwen3-embedding-8b"
  dimensions: 1024
  min_keywords: 1
  max_keywords: 2
  top_k: 5
  min_similarity: 0.5
  input_batch_size: 64
  output_batch_size: 64
  shard_size: 10000
  max_parallel_requests: 5
  timeout: 60
  max_retries: 3
  faiss_nlist: 4096
  faiss_nprobe: 32
  faiss_train_size: 200000
  faiss_batch_size: 10000
  oversample: 10

evaluation:
  hf_config_name: "evaluation"
  data_filename: "evaluation.parquet"
  leaderboard_filename: "leaderboard.parquet"
  model: "gpt-4.1-mini"
  input_batch_size: 128
  shard_size: 5000
  max_parallel_requests: 16
  timeout: 60
  max_retries: 3
  judge_temperature: 0.0
  max_prompt_chars: 1000
  max_response_chars: 1200
  random_seed: 42
