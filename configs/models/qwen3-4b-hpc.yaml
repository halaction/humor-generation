model_name_or_path: Qwen/Qwen3-4B
output_dir: data/checkpoints/mrvf-qwen3-4b
dataset_name: halaction/humor-generation
dataset_config_name: references
train_split: train
eval_split: validation
max_steps: 1000
learning_rate: 7.0e-6
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
num_generations: 4
max_completion_length: 128
max_trace_length: 128
max_reference_length: 128
num_reference_samples: 5
objective_mode: log_mass_surrogate
reward_transform: log_mass
advantage_mode: loo
reference_length_normalization: token_mean
trace_loss_coef: 1.0
reference_loss_coef: 0.5
beta: 0.0
seed: 42
use_thinking: true
strip_thinking_in_outputs: true
trace_format: qwen_chat_thinking
use_peft: true
lora_r: 32
lora_alpha: 64
gradient_checkpointing: true
torch_dtype: bfloat16
logging_steps: 10
save_steps: 100
