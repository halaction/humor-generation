model_name_or_path: Qwen/Qwen3-0.6B
output_dir: data/checkpoints/mrvf-qwen3-06b
dataset_name: halaction/humor-generation
dataset_config_name: references
train_split: train
eval_split: validation
max_steps: 5
learning_rate: 5.0e-5
