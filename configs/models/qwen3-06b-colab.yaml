gradient_accumulation_steps: 1
num_generations: 2
max_completion_length: 32
max_trace_length: 32
max_reference_length: 32
num_reference_samples: 2
objective_mode: log_mass_surrogate
reward_transform: log_mass
advantage_mode: loo
reference_length_normalization: token_mean
trace_loss_coef: 1.0
reference_loss_coef: 0.5
beta: 0.0
seed: 42
use_thinking: true
strip_thinking_in_outputs: true
trace_format: qwen_chat_thinking
use_peft: true
lora_r: 8
lora_alpha: 16
gradient_checkpointing: false
torch_dtype: float16
logging_steps: 1
save_steps: 0
