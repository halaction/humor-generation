model_name_or_path: Qwen/Qwen3-4B
output_dir: data/checkpoints/qwen3-4b-free-think-r1-budgeted
dataset_name: halaction/humor-generation
dataset_config_name: references
train_split: train
eval_split: validation
max_steps: 35
learning_rate: 5.0e-6
per_device_train_batch_size: 1
gradient_accumulation_steps: 2
warmup_ratio: 0.05
num_generations: 2
max_completion_length: 128
max_trace_length: 384
max_reference_length: 64
num_reference_samples: 2
objective_mode: log_mass_surrogate
reward_transform: log_mass
advantage_mode: grpo_zscore
reference_length_normalization: token_mean
trace_loss_coef: 1.0
reference_loss_coef: 0.1
use_kl: false
beta: 0.0
temperature: 0.6
top_p: 0.95
top_k: 20
repetition_penalty: 1.0
seed: 42
use_thinking: true
strip_thinking_in_outputs: true
trace_format: qwen_chat_thinking
trace_prompt_template: training_trace_prompt.j2
force_close_thinking: true
use_peft: true
lora_r: 16
lora_alpha: 32
gradient_checkpointing: true
torch_dtype: bfloat16
eval_every_steps: 10
eval_sample_size: 4
logging_steps: 5
save_steps: 20
metrics_log_path: data/logs/qwen3-4b-free-think-r1-budgeted-metrics.jsonl
sample_log_path: data/logs/qwen3-4b-free-think-r1-budgeted-samples.jsonl
report_to_wandb: true
wandb_project: humor-generation
wandb_run_name: qwen3-4b-mrvf-free-think-r1-budgeted-384x2
wandb_tags:
  - qwen3-4b
  - mrvf
  - free-thinking
  - budgeted-thinking
  - a100
  - r1
  - 384x2
