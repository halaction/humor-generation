model_name_or_path: sshleifer/tiny-gpt2
output_dir: data/checkpoints/tiny
dataset_name: halaction/humor-generation
dataset_config_name: references
train_split: train
eval_split: validation
max_steps: 3
learning_rate: 5.0e-5
per_device_train_batch_size: 2
gradient_accumulation_steps: 1
num_generations: 2
max_completion_length: 16
max_trace_length: 16
max_reference_length: 16
num_reference_samples: 2
objective_mode: log_mass_surrogate
reward_transform: log_mass
advantage_mode: loo
reference_length_normalization: token_mean
trace_loss_coef: 1.0
reference_loss_coef: 0.5
beta: 0.0
seed: 42
use_thinking: false
strip_thinking_in_outputs: true
logging_steps: 1
save_steps: 0
